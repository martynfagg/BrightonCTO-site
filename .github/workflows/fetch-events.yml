name: Fetch Meetup Events

on:
  # Run every day at 06:00 UTC
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Also run on pushes to main (so events.json stays fresh after deploys)
  push:
    branches:
      - main

jobs:
  fetch-events:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the updated events.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch events from Meetup
        env:
          MEETUP_GROUP: brighton-cto
          # Optional: set MEETUP_API_KEY in repository secrets if you have one
          MEETUP_API_KEY: ${{ secrets.MEETUP_API_KEY }}
        run: |
          node scripts/fetch-events.js

      - name: Commit updated events.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          # Only commit if something changed
          git diff --cached --quiet || git commit -m "chore: update events.json [skip ci]"
          git push
